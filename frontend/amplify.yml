version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - rm -rf src/app/api
            - npm run build
      artifacts:
        baseDirectory: out   # matches 'next export' output
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*   # cache all node modules
          - .next/cache/**/*   # cache Next.js build artifacts