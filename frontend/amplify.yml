version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - powershell -ExecutionPolicy Bypass -File deploy.ps1
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
    cache:
      paths:
        - .next/cache
        - node_modules/.cache
