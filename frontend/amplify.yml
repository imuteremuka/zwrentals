version: 1
applications:
  - appRoot: frontend
    frontend:
      framework: none        # Next.js 15 static export
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build     # generates static export automatically (out/)
      artifacts:
        baseDirectory: out     # Next.js 15 outputs static site here
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*