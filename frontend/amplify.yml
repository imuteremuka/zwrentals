version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -rf src/app/api
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
    cache:
      paths:
        - .next/cache
        - node_modules/.cache
