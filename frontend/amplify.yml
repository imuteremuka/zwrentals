version: 1
applications:
  - appRoot: frontend
    frontend:
      framework: none        # <-- important: tells Amplify this is not SSR
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - rm -rf src/app/api
            - npm run build
      artifacts:
        baseDirectory: out     # <-- next export outputs here
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*